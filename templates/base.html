<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}E-Commerce Tax & Ledger{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/theme.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
  </head>
  <body class="bg-app">
    <nav class="navbar navbar-dark app-topbar d-lg-none">
      <div class="container-fluid">
        <button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#appSidebar" aria-controls="appSidebar">
          <i class="fa-solid fa-bars"></i>
        </button>
        <span class="navbar-brand mb-0 h1 d-flex align-items-center gap-2">
          <span class="brand-dot"></span> LedgerPro PH
        </span>
      </div>
    </nav>

    <div class="d-flex">
      <aside class="offcanvas-lg offcanvas-start app-sidebar" tabindex="-1" id="appSidebar" aria-labelledby="appSidebarLabel">
        <div class="offcanvas-header d-lg-none">
          <h5 class="offcanvas-title" id="appSidebarLabel">LedgerPro PH</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-0">
          <div class="px-3 py-3 border-bottom border-white-10">
            <div class="d-flex align-items-center gap-2">
              <span class="brand-dot"></span>
              <div class="fw-semibold">LedgerPro PH</div>
            </div>
            <div class="small text-white-70">E-Commerce Tax & Ledger System</div>
          </div>
          <nav class="p-2">
            <a class="nav-link app-navlink {% if request.path == '/' %}active{% endif %}" href="{{ url_for('dashboard') }}">
              <i class="fa-solid fa-chart-line me-2"></i> Dashboard
            </a>
            <a class="nav-link app-navlink {% if request.path.startswith('/sales-journal') %}active{% endif %}" href="{{ url_for('sales_journal') }}">
              <i class="fa-solid fa-receipt me-2"></i> Sales Journal
            </a>
            <a class="nav-link app-navlink {% if request.path.startswith('/expense-journal') %}active{% endif %}" href="{{ url_for('expense_journal') }}">
              <i class="fa-solid fa-wallet me-2"></i> Expense Journal
            </a>
            <a class="nav-link app-navlink {% if request.path.startswith('/receipt') %}active{% endif %}" href="{{ url_for('receipt') }}">
              <i class="fa-solid fa-file-invoice me-2"></i> Receipt Generator
            </a>
            <a class="nav-link app-navlink {% if request.path.startswith('/reports') %}active{% endif %}" href="{{ url_for('reports') }}">
              <i class="fa-solid fa-chart-pie me-2"></i> Reports
            </a>
          </nav>
          <div class="p-3 mt-auto border-top border-white-10">
            <div class="small text-white-70">
              <span class="me-2"><i class="fa-brands fa-shopify"></i></span>
              Shopee • Lazada • TikTok Shop
            </div>
          </div>
        </div>
      </aside>

      <main class="flex-grow-1 app-content">
        <div class="container-fluid py-4">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastArea"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
