{% extends "base.html" %}

{% block title %}New Receipt - LedgerPro{% endblock %}

{% block auth_content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="bg-white shadow rounded-lg">
        <div class="px-6 py-4 border-b border-gray-200">
            <h1 class="text-lg font-medium text-gray-900">Create New Receipt</h1>
            <p class="mt-1 text-sm text-gray-600">Generate a professional receipt for your customer</p>
        </div>
        
        <form action="{{ url_for('new_receipt') }}" method="POST" class="px-6 py-4">
            <div class="space-y-6">
                <div>
                    <label for="customer_name" class="block text-sm font-medium text-gray-700">Customer Name</label>
                    <input type="text" id="customer_name" name="customer_name" required
                           class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                           placeholder="Enter customer name">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">Items</label>
                    <div id="items-container" class="space-y-2">
                        <div class="item-row flex space-x-2">
                            <input type="text" placeholder="Item name" class="item-name flex-1 border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            <input type="number" placeholder="Price" step="0.01" class="item-price w-24 border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            <input type="number" placeholder="Qty" value="1" min="1" class="item-quantity w-16 border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            <button type="button" onclick="removeItem(this)" class="text-red-600 hover:text-red-800">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="button" onclick="addItem()" class="mt-2 text-indigo-600 hover:text-indigo-800 text-sm font-medium">
                        + Add Item
                    </button>
                </div>

                <div>
                    <label for="total_amount" class="block text-sm font-medium text-gray-700">Total Amount</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="text-gray-500 sm:text-sm">₱</span>
                        </div>
                        <input type="number" id="total_amount" name="total_amount" step="0.01" required readonly
                               class="block w-full pl-7 pr-12 border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm bg-gray-50"
                               placeholder="0.00">
                    </div>
                </div>

                <input type="hidden" id="items" name="items">

                <div class="flex justify-end space-x-3">
                    <a href="{{ url_for('receipts_list') }}" class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cancel
                    </a>
                    <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Create Receipt
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
function addItem() {
    const container = document.getElementById('items-container');
    const newRow = document.createElement('div');
    newRow.className = 'item-row flex space-x-2';
    newRow.innerHTML = `
        <input type="text" placeholder="Item name" class="item-name flex-1 border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        <input type="number" placeholder="Price" step="0.01" class="item-price w-24 border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        <input type="number" placeholder="Qty" value="1" min="1" class="item-quantity w-16 border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        <button type="button" onclick="removeItem(this)" class="text-red-600 hover:text-red-800">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
            </svg>
        </button>
    `;
    container.appendChild(newRow);
    attachEventListeners();
}

function removeItem(button) {
    const rows = document.querySelectorAll('.item-row');
    if (rows.length > 1) {
        button.parentElement.remove();
        calculateTotal();
    }
}

function calculateTotal() {
    const rows = document.querySelectorAll('.item-row');
    let total = 0;
    
    rows.forEach(row => {
        const price = parseFloat(row.querySelector('.item-price').value) || 0;
        const quantity = parseInt(row.querySelector('.item-quantity').value) || 0;
        total += price * quantity;
    });
    
    document.getElementById('total_amount').value = total.toFixed(2);
}

function attachEventListeners() {
    document.querySelectorAll('.item-price, .item-quantity').forEach(input => {
        input.addEventListener('input', calculateTotal);
    });
}

function updateItemsHidden() {
    const rows = document.querySelectorAll('.item-row');
    const items = [];
    
    rows.forEach(row => {
        const name = row.querySelector('.item-name').value;
        const price = parseFloat(row.querySelector('.item-price').value) || 0;
        const quantity = parseInt(row.querySelector('.item-quantity').value) || 0;
        
        if (name && price > 0) {
            items.push({
                name: name,
                price: price,
                quantity: quantity
            });
        }
    });
    
    document.getElementById('items').value = JSON.stringify(items);
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    attachEventListeners();
    
    // Update hidden field before form submission
    document.querySelector('form').addEventListener('submit', function(e) {
        updateItemsHidden();
    });
});
</script>
{% endblock %}
